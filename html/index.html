<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Simple Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
    }

    p {
      opacity: 0.7;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #fff;
      color: #000;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div>
    <h1>Starting Clean 🚀</h1>
    <p>This is your first simple page</p>
    <button onclick="showMessage()">Click Me</button>
  </div>

  <script>
    function showMessage() {
      alert("Hey Alex - You're live on the web 🚀");
    }
  </script>

</body>
</html>
