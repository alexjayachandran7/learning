<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INR Converter</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 300px;
      border: 1px solid #000;
      border-radius: 14px;
      padding: 12px 0;
    }

    .title {
      text-align: center;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .input-box {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    input {
      width: 80%;
      padding: 10px;
      font-size: 22px;
      text-align: center;
      border: 1px solid #000;
      border-radius: 8px;
      outline: none;
      background: #fff;
      color: #000;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 14px 16px;
      border-top: 1px solid #000;
      font-size: 20px;
    }

    .currency {
      font-weight: 500;
    }

    .error {
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">INR CONVERTER</div>

    <div class="input-box">
      <input type="number" id="amount" value="1"/>
    </div>

    <div id="rates"></div>
  </div>

  <script>
    const currencies = ["USD", "EUR", "GBP", "AED", "SGD", "AUD"];
    let rates = {};

    function render(amount) {
      const container = document.getElementById("rates");
      container.innerHTML = "";

      currencies.forEach(cur => {
        const value = (rates[cur] * amount).toFixed(2);

        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<span class="currency">${cur}</span><span>${value}</span>`;

        container.appendChild(row);
      });
    }

    function loadRates() {
      fetch("https://open.er-api.com/v6/latest/INR")
        .then(res => res.json())
        .then(data => {
          rates = data.rates;
          render(document.getElementById("amount").value);
        })
        .catch(() => {
          document.getElementById("rates").innerHTML =
            "<div class='error'>FAILED</div>";
        });
    }

    document.getElementById("amount").addEventListener("input", (e) => {
      const value = e.target.value || 0;
      render(value);
    });

    loadRates();
  </script>

</body>
</html>
